<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji: Banana Hunt HARDCORE</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            background-color: #000; color: white;
            font-family: 'Courier New', Courier, monospace;
        }

        .main-container { width: 100%; display: flex; flex-direction: column; }

        /* --- STORY PANEL --- */
        .panel {
            width: 100%; height: 100vh;
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        .layer { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        .layer img { height: 100%; width: auto; min-width: 100vw; object-fit: cover; }
        
        .floating-text {
            z-index: 100; background: rgba(0,0,0,0.8); padding: 25px;
            border: 2px solid #0ff; text-align: center; width: 85%;
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.4);
        }

        /* --- HARDCORE GAME SECTION --- */
        .game-area {
            position: relative; width: 100%; height: 100vh;
            background: #000; overflow: hidden; touch-action: none;
        }
        .game-bkg img { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0.25; }

        /* Koji Dibuat Lebih Besar */
        #game-koji {
            position: absolute;
            width: 120px; height: auto; /* Ukuran diperbesar */
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 50;
            filter: drop-shadow(0 0 10px #0ff);
        }
        #game-koji img { width: 100%; pointer-events: none; }

        .item { position: absolute; width: 50px; height: 50px; z-index: 60; }

        .game-ui {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: space-around; z-index: 100;
        }
        .ui-box {
            background: rgba(0,0,0,0.9); padding: 10px 20px;
            border: 2px solid #0ff; border-radius: 5px; font-weight: bold;
        }

        /* OVERLAYS */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 200; padding: 30px; text-align: center;
        }
        .overlay.active { display: flex; }
        
        button {
            padding: 18px 50px; background: #0ff; border: none;
            font-weight: bold; border-radius: 5px; font-size: 1.2rem;
            margin-top: 25px; text-transform: uppercase;
        }

        /* Animasi Efek Damage Bom */
        .damage-flash { animation: flashRed 0.3s; }
        @keyframes flashRed {
            0% { background-color: rgba(255, 0, 0, 0); }
            50% { background-color: rgba(255, 0, 0, 0.5); }
            100% { background-color: rgba(255, 0, 0, 0); }
        }
        .shake { animation: shakeAnim 0.2s infinite; }
        @keyframes shakeAnim {
            0% { transform: translateX(-50%) translate(0); }
            50% { transform: translateX(-50%) translate(10px, 5px); }
            100% { transform: translateX(-50%) translate(-10px, -5px); }
        }
    </style>
</head>
<body>

<div class="main-container">
    
    <section class="panel">
        <div class="scene-container">
            <div class="layer"><img src="bkg_kota.png"></div>
            <div class="layer"><img src="mid_koji.png" style="height:55%; bottom:5%; position:absolute;"></div>
            <div class="layer">
                <div class="floating-text">
                    <h1 style="color:#0ff; margin:0;">KOJI HUNT</h1>
                    <p style="color:gold;">MODE: SANGAT SULIT</p>
                    <p>Scroll ke bawah jika berani...</p>
                </div>
            </div>
        </div>
    </section>

    <section class="panel">
        <div class="game-area" id="gameArea">
            <div id="flash-overlay" style="position:absolute; width:100%; height:100%; z-index:150; pointer-events:none;"></div>
            <div class="game-bkg"><img src="bkg_kota.png"></div>
            
            <div id="game-koji"><img src="mid_koji.png"></div>
            <div id="item-container"></div>

            <div class="game-ui">
                <div class="ui-box">SKOR: <span id="score">0</span></div>
                <div class="ui-box">TIME: <span id="timer">30</span></div>
            </div>

            <div id="start-overlay" class="overlay active">
                <h1 style="color: red;">READY?</h1>
                <p>Kecepatan akan meningkat setiap 5 detik!<br>Jangan biarkan Koji meledak.</p>
                <button onclick="startGame()">START MISSION</button>
            </div>

            <div id="end-overlay" class="overlay">
                <h2 style="color: #0ff;">MISSION OVER</h2>
                <p>Skor Akhir:</p>
                <h1 id="final-score" style="font-size: 5rem; margin: 10px 0; color: gold;">0</h1>
                <button onclick="startGame()">TRY AGAIN</button>
            </div>
        </div>
    </section>

</div>

<script>
    let score = 0, timeLeft = 30, gameActive = false;
    let currentFallSpeed = 5;
    let gameInterval, spawnInterval, collisionInterval, difficultyInterval;

    const koji = document.getElementById('game-koji');
    const area = document.getElementById('gameArea');
    const flash = document.getElementById('flash-overlay');
    const itemContainer = document.getElementById('item-container');
    const scoreUI = document.getElementById('score');
    const timerUI = document.getElementById('timer');

    area.addEventListener('touchmove', (e) => {
        if (!gameActive) return;
        const touch = e.touches[0];
        const rect = area.getBoundingClientRect();
        let x = touch.clientX - rect.left - (koji.offsetWidth / 2);
        x = Math.max(0, Math.min(x, rect.width - koji.offsetWidth));
        koji.style.left = x + 'px';
    }, { passive: false });

    function startGame() {
        score = 0; timeLeft = 30; currentFallSpeed = 5; gameActive = true;
        scoreUI.innerText = score; timerUI.innerText = timeLeft;
        
        document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
        itemContainer.innerHTML = '';

        gameInterval = setInterval(() => {
            timeLeft--;
            timerUI.innerText = timeLeft;
            if (timeLeft <= 0) endGame();
        }, 1000);

        // Tingkatkan kesulitan setiap 5 detik
        difficultyInterval = setInterval(() => {
            currentFallSpeed += 1.5;
        }, 5000);

        spawnInterval = setInterval(spawnItem, 400); // Lebih cepat muncul
        collisionInterval = setInterval(checkHit, 30);
    }

    function spawnItem() {
        if (!gameActive) return;
        const item = document.createElement('img');
        const isBomb = Math.random() < 0.35; // Persentase bom lebih tinggi
        
        item.src = isBomb ? 'bomb.png' : 'banana.png';
        item.className = 'item';
        item.dataset.type = isBomb ? 'bomb' : 'banana';
        
        const startX = Math.random() * (area.offsetWidth - 50);
        item.style.left = startX + 'px';
        item.style.top = '-60px';
        
        itemContainer.appendChild(item);

        let pos = -60;
        const fall = setInterval(() => {
            if (!gameActive) { clearInterval(fall); item.remove(); return; }
            pos += currentFallSpeed;
            item.style.top = pos + 'px';
            
            if (pos > area.offsetHeight) {
                clearInterval(fall);
                if (item.parentNode) item.remove();
            }
        }, 20);
    }

    function checkHit() {
        if (!gameActive) return;
        const kRect = koji.getBoundingClientRect();
        const items = document.querySelectorAll('.item');

        items.forEach(item => {
            const iRect = item.getBoundingClientRect();

            // Deteksi tabrakan presisi
            if (iRect.left < kRect.right && iRect.right > kRect.left &&
                iRect.top < kRect.bottom && iRect.bottom > kRect.top) {
                
                if (item.dataset.type === 'banana') {
                    score += 15;
                } else {
                    score = Math.max(0, score - 50); // Penalti bom lebih berat
                    triggerDamage();
                }
                scoreUI.innerText = score;
                item.remove();
            }
        });
    }

    function triggerDamage() {
        flash.classList.add('damage-flash');
        koji.classList.add('shake');
        setTimeout(() => {
            flash.classList.remove('damage-flash');
            koji.classList.remove('shake');
        }, 300);
    }

    function endGame() {
        gameActive = false;
        clearInterval(gameInterval);
        clearInterval(spawnInterval);
        clearInterval(collisionInterval);
        clearInterval(difficultyInterval);
        document.getElementById('final-score').innerText = score;
        document.getElementById('end-overlay').classList.add('active');
    }
</script>

</body>
</html>
