<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Hunt: Big & Hardcore</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            background-color: #000; color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        .main-container { width: 100%; display: flex; flex-direction: column; }

        /* --- STORY PANEL --- */
        .panel {
            width: 100%; height: 100vh;
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        
        .layer-bg { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .layer-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .floating-text {
            z-index: 10; background: rgba(0,0,0,0.85); padding: 20px;
            border: 2px solid #0ff; text-align: center; width: 85%;
            box-shadow: 0 0 20px #0ff;
        }

        /* --- GAME AREA --- */
        .game-area {
            position: relative; width: 100%; height: 100vh;
            background: #000; overflow: hidden; touch-action: none;
        }
        
        .game-bkg { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .game-bkg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }

        /* KOJI DIPERBESAR (BIG SIZE) */
        #game-koji {
            position: absolute;
            width: 160px; height: auto; /* Ukuran jauh lebih besar */
            bottom: 30px; left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            filter: drop-shadow(0 0 15px rgba(0, 255, 255, 0.7));
            pointer-events: none;
            transition: left 0.1s ease-out;
        }
        #game-koji img { width: 100%; display: block; }

        /* Item Jatuh */
        .item { 
            position: absolute; width: 55px; height: 55px; 
            z-index: 50; 
        }

        /* UI Styling */
        .game-ui {
            position: absolute; top: 15px; width: 100%;
            display: flex; justify-content: space-evenly; 
            z-index: 200; 
        }
        .ui-box {
            background: #000; padding: 12px;
            border: 2px solid #0ff; color: #0ff;
            font-weight: bold; min-width: 110px; text-align: center;
            box-shadow: 0 0 10px rgba(0, 255, 255, 0.3);
        }

        /* Overlay */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.96); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 300; padding: 25px; text-align: center;
        }
        .overlay.active { display: flex; }
        
        button {
            padding: 18px 50px; background: #0ff; border: none;
            font-weight: bold; border-radius: 8px; font-size: 1.3rem;
            margin-top: 25px; box-shadow: 0 0 15px #0ff;
            color: #000;
        }

        /* Visual Effects */
        #flash-effect {
            position: absolute; width: 100%; height: 100%; 
            z-index: 150; pointer-events: none;
        }
        .damage-flash { animation: flashRed 0.2s; }
        @keyframes flashRed {
            0% { background: rgba(255,0,0,0); }
            50% { background: rgba(255,0,0,0.5); }
            100% { background: rgba(255,0,0,0); }
        }
        .shake { animation: shakeAnim 0.2s; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(-50%) scale(1); }
            25% { transform: translateX(-53%) scale(1.05); }
            75% { transform: translateX(-47%) scale(0.95); }
        }
    </style>
</head>
<body>

<div class="main-container">
    
    <section class="panel">
        <div class="layer-bg"><img src="bkg_kota.png"></div>
        <div class="floating-text">
            <h1 style="color:#0ff; margin:0; font-size: 2rem;">KOJI HUNT</h1>
            <p style="color:gold; letter-spacing: 2px;">BIG CHARACTER MODE</p>
            <p>Scroll ke bawah untuk mulai bermain!</p>
        </div>
    </section>

    <section class="panel">
        <div class="game-area" id="gameArea">
            <div id="flash-effect"></div>
            <div class="game-bkg"><img src="bkg_kota.png"></div>
            
            <div id="game-koji">
                <img src="mid_koji.png" alt="Koji">
            </div>

            <div id="item-container"></div>

            <div class="game-ui">
                <div class="ui-box">SKOR: <span id="score">0</span></div>
                <div class="ui-box">TIME: <span id="timer">30</span></div>
            </div>

            <div id="start-overlay" class="overlay active">
                <h1 style="color: gold; font-size: 2.5rem;">READY?</h1>
                <p>Gunakan jempol untuk menggeser Koji.<br>Kumpulkan Pisang secepat mungkin!</p>
                <button onclick="startGame()">MULAI MISI</button>
            </div>

            <div id="end-overlay" class="overlay">
                <h2 style="color:#0ff;">MISI SELESAI</h2>
                <p>Total Energi Terkumpul:</p>
                <h1 id="final-score" style="font-size: 5rem; color: gold; margin: 15px 0;">0</h1>
                <button onclick="startGame()">MAIN LAGI</button>
            </div>
        </div>
    </section>

</div>

<script>
    let score = 0, timeLeft = 30, gameActive = false;
    let speed = 7;
    let gameClock, spawnClock, collisionClock;

    const koji = document.getElementById('game-koji');
    const area = document.getElementById('gameArea');
    const flash = document.getElementById('flash-effect');
    const itemContainer = document.getElementById('item-container');

    // Kontrol: Menggunakan Touch agar Koji lebih responsif di layar besar
    area.addEventListener('touchmove', (e) => {
        if (!gameActive) return;
        const touch = e.touches[0];
        const rect = area.getBoundingClientRect();
        let x = touch.clientX - rect.left - (koji.offsetWidth / 2);
        
        x = Math.max(0, Math.min(x, rect.width - koji.offsetWidth));
        koji.style.left = x + 'px';
    }, { passive: false });

    function startGame() {
        score = 0; timeLeft = 30; speed = 7; gameActive = true;
        document.getElementById('score').innerText = score;
        document.getElementById('timer').innerText = timeLeft;
        document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
        itemContainer.innerHTML = '';

        gameClock = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft % 4 === 0) speed += 1.5; // Kecepatan meningkat lebih agresif
            if (timeLeft <= 0) endGame();
        }, 1000);

        spawnClock = setInterval(spawnItem, 400); // Barang muncul lebih cepat
        collisionClock = setInterval(checkHit, 30);
    }

    function spawnItem() {
        if (!gameActive) return;
        const item = document.createElement('img');
        const isBomb = Math.random() < 0.35;
        
        item.src = isBomb ? 'bomb.png' : 'banana.png';
        item.className = 'item';
        item.dataset.type = isBomb ? 'bomb' : 'banana';
        
        const x = Math.random() * (area.offsetWidth - 55);
        item.style.left = x + 'px';
        item.style.top = '-70px';
        
        itemContainer.appendChild(item);

        let pos = -70;
        const fall = setInterval(() => {
            if (!gameActive) { clearInterval(fall); item.remove(); return; }
            pos += speed;
            item.style.top = pos + 'px';
            
            if (pos > area.offsetHeight) {
                clearInterval(fall);
                if (item.parentNode) item.remove();
            }
        }, 20);
    }

    function checkHit() {
        if (!gameActive) return;
        const kRect = koji.getBoundingClientRect();
        
        // Pengecilan Hitbox agar tidak terlalu sensitif karena Koji besar
        const hitboxAdjustment = 20;
        const adjKRect = {
            left: kRect.left + hitboxAdjustment,
            right: kRect.right - hitboxAdjustment,
            top: kRect.top + hitboxAdjustment,
            bottom: kRect.bottom
        };

        const items = document.querySelectorAll('.item');

        items.forEach(item => {
            const iRect = item.getBoundingClientRect();

            if (iRect.left < adjKRect.right && iRect.right > adjKRect.left &&
                iRect.top < adjKRect.bottom && iRect.bottom > adjKRect.top) {
                
                if (item.dataset.type === 'banana') {
                    score += 20; // Skor per pisang naik
                } else {
                    score = Math.max(0, score - 60); // Penalti bom lebih fatal
                    flash.classList.add('damage-flash');
                    koji.classList.add('shake');
                    setTimeout(() => {
                        flash.classList.remove('damage-flash');
                        koji.classList.remove('shake');
                    }, 300);
                }
                document.getElementById('score').innerText = score;
                item.remove();
            }
        });
    }

    function endGame() {
        gameActive = false;
        clearInterval(gameClock);
        clearInterval(spawnClock);
        clearInterval(collisionClock);
        document.getElementById('final-score').innerText = score;
        document.getElementById('end-overlay').classList.add('active');
    }
</script>

</body>
</html>
