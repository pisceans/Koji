<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Hunt: Hardcore Mobile</title>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; min-height: 100%;
            background-color: #000; color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow-x: hidden;
        }

        .main-container { width: 100%; display: flex; flex-direction: column; }

        /* --- STORY PANEL --- */
        .panel {
            width: 100%; height: 100vh;
            position: relative; overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }
        
        .layer-bg { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .layer-bg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.6; }

        .floating-text {
            z-index: 10; background: rgba(0,0,0,0.85); padding: 20px;
            border: 2px solid #0ff; text-align: center; width: 85%;
            box-shadow: 0 0 20px #0ff;
        }

        /* --- GAME AREA FIX --- */
        .game-area {
            position: relative; width: 100%; height: 100vh;
            background: #000; overflow: hidden; touch-action: none;
        }
        
        .game-bkg { position: absolute; width: 100%; height: 100%; z-index: 1; }
        .game-bkg img { width: 100%; height: 100%; object-fit: cover; opacity: 0.3; }

        /* Koji: Pastikan Z-Index Tinggi agar tidak tertutup */
        #game-koji {
            position: absolute;
            width: 130px; height: auto; 
            bottom: 20px; left: 50%;
            transform: translateX(-50%);
            z-index: 100; /* Di depan semua item */
            filter: drop-shadow(0 0 10px #0ff);
            pointer-events: none;
        }
        #game-koji img { width: 100%; display: block; }

        /* Item yang jatuh */
        .item { 
            position: absolute; width: 50px; height: 50px; 
            z-index: 50; /* Di belakang Koji tapi di depan Background */
        }

        /* UI: Pastikan Z-Index paling tinggi */
        .game-ui {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-evenly; 
            z-index: 200; 
        }
        .ui-box {
            background: #000; padding: 10px;
            border: 2px solid #0ff; color: #0ff;
            font-weight: bold; min-width: 100px; text-align: center;
        }

        /* Overlay */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.95); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 300; padding: 20px; text-align: center;
        }
        .overlay.active { display: flex; }
        
        button {
            padding: 15px 40px; background: #0ff; border: none;
            font-weight: bold; border-radius: 5px; font-size: 1.2rem;
            margin-top: 20px; box-shadow: 0 0 10px #0ff;
        }

        /* Efek damage */
        #flash-effect {
            position: absolute; width: 100%; height: 100%; 
            z-index: 150; pointer-events: none;
        }
        .damage-flash { animation: flashRed 0.2s; }
        @keyframes flashRed {
            0% { background: rgba(255,0,0,0); }
            50% { background: rgba(255,0,0,0.4); }
            100% { background: rgba(255,0,0,0); }
        }
        .shake { animation: shakeAnim 0.2s; }
        @keyframes shakeAnim {
            0%, 100% { transform: translateX(-50%) rotate(0); }
            25% { transform: translateX(-55%) rotate(-5deg); }
            75% { transform: translateX(-45%) rotate(5deg); }
        }
    </style>
</head>
<body>

<div class="main-container">
    
    <section class="panel">
        <div class="layer-bg"><img src="bkg_kota.png"></div>
        <div class="floating-text">
            <h1 style="color:#0ff; margin:0;">KOJI HUNT</h1>
            <p style="color:gold;">MODE: HARDCORE</p>
            <p>Scroll ke bawah untuk MISI</p>
        </div>
    </section>

    <section class="panel">
        <div class="game-area" id="gameArea">
            <div id="flash-effect"></div>
            <div class="game-bkg"><img src="bkg_kota.png"></div>
            
            <div id="game-koji">
                <img src="mid_koji.png" alt="Koji">
            </div>

            <div id="item-container"></div>

            <div class="game-ui">
                <div class="ui-box">SKOR: <span id="score">0</span></div>
                <div class="ui-box">TIME: <span id="timer">30</span></div>
            </div>

            <div id="start-overlay" class="overlay active">
                <h2 style="color: red;">READY?</h2>
                <p>Tangkap Pisang.<br>Hindari Bom!</p>
                <button onclick="startGame()">START</button>
            </div>

            <div id="end-overlay" class="overlay">
                <h2 style="color:#0ff;">FINISH</h2>
                <p>Skor Kamu:</p>
                <h1 id="final-score" style="font-size: 4rem; color: gold;">0</h1>
                <button onclick="startGame()">ULANGI</button>
            </div>
        </div>
    </section>

</div>

<script>
    let score = 0, timeLeft = 30, gameActive = false;
    let speed = 6;
    let gameClock, spawnClock, collisionClock;

    const koji = document.getElementById('game-koji');
    const area = document.getElementById('gameArea');
    const flash = document.getElementById('flash-effect');
    const itemContainer = document.getElementById('item-container');

    // Kontrol: Menggunakan TouchMove agar Koji geser mengikuti jari
    area.addEventListener('touchmove', (e) => {
        if (!gameActive) return;
        const touch = e.touches[0];
        const rect = area.getBoundingClientRect();
        let x = touch.clientX - rect.left - (koji.offsetWidth / 2);
        
        // Batas Layar
        x = Math.max(0, Math.min(x, rect.width - koji.offsetWidth));
        koji.style.left = x + 'px';
    }, { passive: false });

    function startGame() {
        score = 0; timeLeft = 30; speed = 6; gameActive = true;
        document.getElementById('score').innerText = score;
        document.getElementById('timer').innerText = timeLeft;
        document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
        itemContainer.innerHTML = '';

        gameClock = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft % 5 === 0) speed += 1; // Makin lama makin cepat
            if (timeLeft <= 0) endGame();
        }, 1000);

        spawnClock = setInterval(spawnItem, 450);
        collisionClock = setInterval(checkHit, 40);
    }

    function spawnItem() {
        if (!gameActive) return;
        const item = document.createElement('img');
        const isBomb = Math.random() < 0.35;
        
        item.src = isBomb ? 'bomb.png' : 'banana.png';
        item.className = 'item';
        item.dataset.type = isBomb ? 'bomb' : 'banana';
        
        const x = Math.random() * (area.offsetWidth - 50);
        item.style.left = x + 'px';
        item.style.top = '-60px';
        
        itemContainer.appendChild(item);

        let pos = -60;
        const fall = setInterval(() => {
            if (!gameActive) { clearInterval(fall); item.remove(); return; }
            pos += speed;
            item.style.top = pos + 'px';
            
            if (pos > area.offsetHeight) {
                clearInterval(fall);
                if (item.parentNode) item.remove();
            }
        }, 20);
    }

    function checkHit() {
        if (!gameActive) return;
        const kRect = koji.getBoundingClientRect();
        const items = document.querySelectorAll('.item');

        items.forEach(item => {
            const iRect = item.getBoundingClientRect();

            if (iRect.left < kRect.right && iRect.right > kRect.left &&
                iRect.top < kRect.bottom && iRect.bottom > kRect.top) {
                
                if (item.dataset.type === 'banana') {
                    score += 15;
                } else {
                    score = Math.max(0, score - 40);
                    flash.classList.add('damage-flash');
                    koji.classList.add('shake');
                    setTimeout(() => {
                        flash.classList.remove('damage-flash');
                        koji.classList.remove('shake');
                    }, 300);
                }
                document.getElementById('score').innerText = score;
                item.remove();
            }
        });
    }

    function endGame() {
        gameActive = false;
        clearInterval(gameClock);
        clearInterval(spawnClock);
        clearInterval(collisionClock);
        document.getElementById('final-score').innerText = score;
        document.getElementById('end-overlay').classList.add('active');
    }
</script>

</body>
</html>
