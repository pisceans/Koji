<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Hunt: Hardcore Edition</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000; color: white;
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden; position: fixed;
        }

        .bg-layer {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; opacity: 0.35;
        }
        .bg-layer img { width: 100%; height: 100%; object-fit: cover; }

        .game-container {
            position: relative; width: 100%; height: 100%;
            z-index: 2; overflow: hidden;
        }

        #game-koji {
            position: absolute;
            width: 150px; bottom: 180px;
            left: 50%; transform: translateX(-50%);
            z-index: 100; filter: drop-shadow(0 0 15px #0ff);
            will-change: left;
        }
        #game-koji img { width: 100%; display: block; }

        .item { position: absolute; width: 60px; height: 60px; z-index: 50; }

        .game-ui {
            position: absolute; top: 35px; width: 100%;
            display: flex; justify-content: space-evenly; z-index: 200;
        }
        .ui-box {
            background: rgba(0,0,0,0.8); padding: 10px;
            border: 2px solid #0ff; color: #0ff; font-weight: bold; min-width: 110px; text-align: center;
            box-shadow: 0 0 10px rgba(0,255,255,0.3);
        }

        .controls {
            position: absolute; bottom: 55px;
            width: 100%; display: flex; justify-content: space-between;
            padding: 0 40px; z-index: 400;
        }
        .dpad-btn {
            width: 85px; height: 85px;
            background: rgba(0, 255, 255, 0.4);
            border: 4px solid #0ff; border-radius: 50%;
            color: #0ff; font-size: 2rem;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.6);
        }
        .dpad-btn:active { background: #0ff; color: #000; transform: scale(0.9); }

        #lang-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        .lang-btn {
            width: 250px; padding: 15px; margin: 10px; border: 2px solid #0ff;
            background: none; color: #0ff; font-weight: bold; border-radius: 10px;
        }

        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92); display: none;
            flex-direction: column; justify-content: center; align-items: center;
            z-index: 300; text-align: center; padding: 20px;
        }
        .overlay.active { display: flex; }
        .btn-main { padding: 15px 45px; background: #0ff; border: none; font-weight: bold; margin-top: 20px; font-size: 1.1rem; }

        #flash { position: absolute; width: 100%; height: 100%; z-index: 150; pointer-events: none; }
        .damage { animation: flashRed 0.2s; }
        @keyframes flashRed { 50% { background: rgba(255,0,0,0.6); } }
    </style>
</head>
<body>

<div id="lang-overlay">
    <h2 style="color:#0ff; letter-spacing: 2px;">CHOOSE YOUR MODE</h2>
    <button class="lang-btn" onclick="setLanguage('id')">INDONESIA</button>
    <button class="lang-btn" onclick="setLanguage('en')">ENGLISH</button>
    <button class="lang-btn" onclick="setLanguage('jp')">日本語</button>
</div>

<div class="bg-layer"><img src="bkg_kota.png"></div>

<div class="game-container">
    <div id="flash"></div>
    <div id="game-koji"><img src="mid_koji.png"></div>
    <div id="item-container"></div>

    <div class="game-ui">
        <div class="ui-box"><span id="l-score">SCORE</span>: <span id="score">0</span></div>
        <div class="ui-box"><span id="l-time">TIME</span>: <span id="timer">30</span></div>
    </div>

    <div class="controls">
        <div class="dpad-btn" id="btn-left">◀</div>
        <div class="dpad-btn" id="btn-right">▶</div>
    </div>

    <div id="start-overlay" class="overlay">
        <h1 id="t-ready" style="color: gold; font-size: 2.5rem; margin: 0;"></h1>
        <p id="t-inst" style="color: #0ff; margin-top: 10px;"></p>
        <button class="btn-main" id="b-start" onclick="startGame()"></button>
    </div>

    <div id="end-overlay" class="overlay">
        <h2 id="t-fin" style="color:#0ff;"></h2>
        <h1 id="final-score" style="font-size: 5rem; color: gold; margin: 10px 0;">0</h1>
        <p id="t-rank" style="color: white; font-weight: bold;"></p>
        <button class="btn-main" id="b-retry" onclick="startGame()"></button>
    </div>
</div>

<script>
    const i18n = {
        id: { score: "SKOR", time: "WAKTU", ready: "MODAL FOKUS!", inst: "Hindari Bom, Kecepatan akan meningkat!", start: "MULAI MISI", fin: "HASIL AKHIR", retry: "COBA LAGI", rank: "Peringkat: " },
        en: { score: "SCORE", time: "TIME", ready: "STAY FOCUSED!", inst: "Avoid Bombs, Speed will increase!", start: "START MISSION", fin: "FINAL RESULT", retry: "PLAY AGAIN", rank: "Rank: " },
        jp: { score: "スコア", time: "時間", ready: "集中しろ！", inst: "爆弾を避けろ、速度が上がるぞ！", start: "ミッション開始", fin: "最終結果", retry: "リトライ", rank: "ランク: " }
    };

    let score = 0, timeLeft = 30, gameActive = false;
    let baseSpeed = 8, spawnRate = 600;
    let kojiX = 50, moveL = false, moveR = false;
    let lang = 'id';

    function setLanguage(l) {
        lang = l;
        const t = i18n[l];
        document.getElementById('l-score').innerText = t.score;
        document.getElementById('l-time').innerText = t.time;
        document.getElementById('t-ready').innerText = t.ready;
        document.getElementById('t-inst').innerText = t.inst;
        document.getElementById('b-start').innerText = t.start;
        document.getElementById('t-fin').innerText = t.fin;
        document.getElementById('b-retry').innerText = t.retry;
        document.getElementById('lang-overlay').style.display = 'none';
        document.getElementById('start-overlay').classList.add('active');
    }

    const koji = document.getElementById('game-koji');
    const container = document.querySelector('.game-container');
    const itemContainer = document.getElementById('item-container');

    // Kontrol Responsif
    const bL = document.getElementById('btn-left');
    const bR = document.getElementById('btn-right');
    const startMoveL = (e) => { e.preventDefault(); moveL = true; };
    const startMoveR = (e) => { e.preventDefault(); moveR = true; };
    const stopMove = () => { moveL = false; moveR = false; };

    bL.addEventListener('touchstart', startMoveL);
    bR.addEventListener('touchstart', startMoveR);
    window.addEventListener('touchend', stopMove);

    function updatePhysics() {
        if (gameActive) {
            if (moveL) kojiX -= 2.5; 
            if (moveR) kojiX += 2.5;
            kojiX = Math.max(8, Math.min(92, kojiX));
            koji.style.left = kojiX + '%';
        }
        requestAnimationFrame(updatePhysics);
    }
    requestAnimationFrame(updatePhysics);

    function startGame() {
        score = 0; timeLeft = 45; baseSpeed = 8; spawnRate = 600; gameActive = true; kojiX = 50;
        document.getElementById('score').innerText = "0";
        document.getElementById('timer').innerText = timeLeft;
        document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
        itemContainer.innerHTML = '';
        
        const gameTick = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            
            // Difficulty Spike
            if(timeLeft % 5 === 0) {
                baseSpeed += 1.2;
                spawnRate = Math.max(250, spawnRate - 50);
            }

            if(timeLeft <= 0) { clearInterval(gameTick); endGame(); }
        }, 1000);

        autoSpawn();
    }

    function autoSpawn() {
        if(!gameActive) return;
        createItem();
        setTimeout(autoSpawn, spawnRate);
    }

    function createItem() {
        const item = document.createElement('img');
        const rand = Math.random();
        let type = 'banana';
        
        if (rand < 0.35) type = 'bomb';
        else if (rand > 0.9) type = 'gold'; // Item langka (50 poin)

        item.src = type === 'bomb' ? 'bomb.png' : 'banana.png';
        item.className = 'item';
        if(type === 'gold') item.style.filter = "hue-rotate(45deg) brightness(1.5)";
        
        item.style.left = Math.random() * (container.offsetWidth - 60) + 'px';
        item.style.top = '-70px';
        itemContainer.appendChild(item);

        let y = -70;
        let fallSpeed = baseSpeed + (Math.random() * 3); // Kecepatan variasi tiap item

        function fall() {
            if(!gameActive || !item.parentNode) return;
            y += fallSpeed;
            item.style.top = y + 'px';
            
            const k = koji.getBoundingClientRect();
            const i = item.getBoundingClientRect();
            
            // Precise Collision Detection
            if(i.left < k.right-45 && i.right > k.left+45 && i.top < k.bottom-25 && i.bottom > k.top+25) {
                if(type === 'bomb') {
                    score = Math.max(0, score - 70);
                    document.getElementById('flash').classList.add('damage');
                    setTimeout(() => document.getElementById('flash').classList.remove('damage'), 200);
                } else {
                    score += (type === 'gold' ? 50 : 20);
                }
                document.getElementById('score').innerText = score;
                item.remove();
                return;
            }
            if(y < container.offsetHeight) requestAnimationFrame(fall);
            else item.remove();
        }
        requestAnimationFrame(fall);
    }

    function endGame() {
        gameActive = false;
        const t = i18n[lang];
        document.getElementById('final-score').innerText = score;
        
        let rank = "ROOKIE";
        if(score > 500) rank = "PRO MODERATOR";
        if(score > 1000) rank = "WEB3 LEGEND";
        
        document.getElementById('t-rank').innerText = t.rank + rank;
        document.getElementById('end-overlay').classList.add('active');
    }
</script>
</body>
</html>
