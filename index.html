<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Koji Hunt: Ultra Responsive</title>
    <style>
        /* ... (Gunakan CSS sebelumnya, tapi ubah bagian ini) ... */

        #game-koji {
            position: absolute;
            width: 180px; height: auto;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            filter: drop-shadow(0 0 15px #0ff);
            /* HAPUS TRANSITION AGAR TIDAK DELAY */
            transition: none !important; 
            pointer-events: none;
            will-change: left; /* Memberi tahu browser untuk siap bergerak cepat */
        }
        
        /* Pastikan game area mengunci semua gerakan default browser */
        .game-area {
            touch-action: none;
            -webkit-user-select: none;
            user-select: none;
        }

        /* ... (Sisa CSS lainnya tetap sama) ... */
    </style>
</head>
<body>
    <script>
    // --- KODE TRANSLASI TETAP SAMA ---
    const translations = {
        id: { sub: "MODE KARAKTER BESAR", scroll: "Scroll ke bawah untuk mulai!", score: "SKOR", time: "WAKTU", ready: "SIAP?", instr: "Tangkap Pisang, Hindari Bom!", start: "MULAI MISI", finish: "SELESAI", total: "Total Skor:", retry: "MAIN LAGI" },
        en: { sub: "BIG CHARACTER MODE", scroll: "Scroll down to play!", score: "SCORE", time: "TIME", ready: "READY?", instr: "Catch Bananas, Avoid Bombs!", start: "START MISSION", finish: "FINISHED", total: "Total Score:", retry: "PLAY AGAIN" },
        jp: { sub: "巨大キャラクターモード", scroll: "下にスクロールして開始！", score: "スコア", time: "時間", ready: "準備はいいか？", instr: "バナナを捕まえろ、爆弾を避けろ！", start: "ミッション開始", finish: "終了", total: "合計スコア:", retry: "もう一度" }
    };

    let currentLang = 'id';
    function selectLang(lang) {
        currentLang = lang;
        const t = translations[lang];
        document.getElementById('txt-subtitle').innerText = t.sub;
        document.getElementById('txt-scroll').innerText = t.scroll;
        document.getElementById('lbl-score').innerText = t.score;
        document.getElementById('lbl-time').innerText = t.time;
        document.getElementById('txt-ready').innerText = t.ready;
        document.getElementById('txt-instr').innerText = t.instr;
        document.getElementById('btn-start').innerText = t.start;
        document.getElementById('txt-finish').innerText = t.finish;
        document.getElementById('txt-total').innerText = t.total;
        document.getElementById('btn-retry').innerText = t.retry;
        document.getElementById('lang-overlay').style.display = 'none';
        document.getElementById('start-overlay').classList.add('active');
    }

    let score = 0, timeLeft = 30, gameActive = false, speed = 8;
    let gameClock, spawnClock, collisionClock;
    let targetX = 0; // Posisi tujuan Koji

    const koji = document.getElementById('game-koji');
    const area = document.getElementById('gameArea');
    const itemContainer = document.getElementById('item-container');

    // --- OPTIMASI PERGERAKAN: ULTRA RESPONSIVE ---
    area.addEventListener('touchstart', updateKojiPos, { passive: false });
    area.addEventListener('touchmove', updateKojiPos, { passive: false });

    function updateKojiPos(e) {
        if (!gameActive) return;
        e.preventDefault(); // Menghentikan semua lag/scroll default
        
        const touch = e.touches[0];
        const rect = area.getBoundingClientRect();
        
        // Menghitung posisi tengah Koji tepat di bawah jari
        let x = touch.clientX - rect.left - (koji.offsetWidth / 2);
        
        // Batas Layar
        x = Math.max(0, Math.min(x, rect.width - koji.offsetWidth));
        
        // Update instan tanpa animasi CSS
        koji.style.left = x + 'px';
    }

    // --- GAME ENGINE TETAP SAMA ---
    function startGame() {
        score = 0; timeLeft = 30; speed = 8; gameActive = true;
        document.getElementById('score').innerText = score;
        document.getElementById('timer').innerText = timeLeft;
        document.querySelectorAll('.overlay').forEach(o => o.classList.remove('active'));
        itemContainer.innerHTML = '';

        gameClock = setInterval(() => {
            timeLeft--;
            document.getElementById('timer').innerText = timeLeft;
            if (timeLeft % 4 === 0) speed += 2;
            if (timeLeft <= 0) endGame();
        }, 1000);

        spawnClock = setInterval(spawnItem, 400);
        collisionClock = setInterval(checkHit, 20); // Dipercepat untuk akurasi
    }

    function spawnItem() {
        if (!gameActive) return;
        const item = document.createElement('img');
        const isBomb = Math.random() < 0.35;
        item.src = isBomb ? 'bomb.png' : 'banana.png';
        item.className = 'item';
        item.dataset.type = isBomb ? 'bomb' : 'banana';
        item.style.left = Math.random() * (area.offsetWidth - 55) + 'px';
        item.style.top = '-70px';
        itemContainer.appendChild(item);

        let pos = -70;
        function fallItem() {
            if (!gameActive) { item.remove(); return; }
            pos += speed;
            item.style.top = pos + 'px';
            if (pos < area.offsetHeight) {
                requestAnimationFrame(fallItem);
            } else {
                item.remove();
            }
        }
        requestAnimationFrame(fallItem);
    }

    function checkHit() {
        if (!gameActive) return;
        const kRect = koji.getBoundingClientRect();
        const items = document.querySelectorAll('.item');
        items.forEach(item => {
            const iRect = item.getBoundingClientRect();
            // Hitbox disesuaikan agar pas dengan karakter besar
            if (iRect.left < kRect.right - 40 && iRect.right > kRect.left + 40 &&
                iRect.top < kRect.bottom - 20 && iRect.bottom > kRect.top + 20) {
                if (item.dataset.type === 'banana') { score += 20; } 
                else { 
                    score = Math.max(0, score - 60); 
                    document.getElementById('flash').classList.add('damage');
                    koji.classList.add('shake');
                    setTimeout(() => { document.getElementById('flash').classList.remove('damage'); koji.classList.remove('shake'); }, 300);
                }
                document.getElementById('score').innerText = score;
                item.remove();
            }
        });
    }

    function endGame() {
        gameActive = false;
        clearInterval(gameClock); clearInterval(spawnClock); clearInterval(collisionClock);
        document.getElementById('final-score').innerText = score;
        document.getElementById('end-overlay').classList.add('active');
    }
</script>
</body>
</html>
